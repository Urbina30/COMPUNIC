<!DOCTYPE html>
<html lang="es">

<!-- 
  ========================================== 
  Plantilla principal. 
  Nota mental: Revisar accesibilidad (algún día). 
  ========================================== 
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Compunic</title>
  <meta name="description" content="Inicia sesión en el Sistema de Inventario Compunic">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="js/auth.js"></script>
  <style>
    /* ==========================================
       RESET & BASE
       ========================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ==========================================
       ANIMATED BACKGROUND
       ========================================== */
    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-particles .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .bg-particles .orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #145D90, transparent 70%);
      top: -150px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-particles .orb:nth-child(2) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #56A5DD, transparent 70%);
      bottom: -100px;
      right: -50px;
      animation-delay: -7s;
      animation-duration: 25s;
    }

    .bg-particles .orb:nth-child(3) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #1a3a5c, transparent 70%);
      top: 50%;
      left: 40%;
      animation-delay: -14s;
      animation-duration: 30s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(30px, -40px) scale(1.05);
      }

      50% {
        transform: translate(-20px, 20px) scale(0.95);
      }

      75% {
        transform: translate(15px, 30px) scale(1.02);
      }
    }

    /* Floating dots */
    .bg-particles .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(86, 165, 221, 0.5);
      border-radius: 50%;
      animation: dotDrift linear infinite;
    }

    @keyframes dotDrift {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-100px) scale(1);
        opacity: 0;
      }
    }

    /* Grid lines effect */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(86, 165, 221, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(86, 165, 221, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ==========================================
       LAYOUT: SPLIT VIEW
       ========================================== */
    .login-wrapper {
      display: flex;
      width: 100%;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ==========================================
       LEFT PANEL - BRANDING
       ========================================== */
    .brand-panel {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 40%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      overflow: hidden;
      z-index: 1;
    }

    .brand-panel .brand-content {
      position: relative;
      z-index: 2;
      animation: fadeSlideUp 0.8s ease-out;
    }

    .brand-logo {
      width: 120px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 4px 20px rgba(86, 165, 221, 0.3));
    }

    .brand-title {
      font-size: 3.5rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .brand-title span {
      background: linear-gradient(135deg, #56A5DD, #89c4f4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-subtitle {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
      margin-bottom: 3rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .brand-features {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .brand-feature {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .brand-feature .feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(86, 165, 221, 0.1);
      border: 1px solid rgba(86, 165, 221, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #56A5DD;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    /* Decorative circuit lines */
    .brand-panel .circuit-decoration {
      position: absolute;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      height: 400px;
      opacity: 0.08;
    }

    .circuit-decoration svg {
      width: 100%;
      height: 100%;
    }

    /* ==========================================
       RIGHT PANEL - LOGIN FORM
       ========================================== */
    .form-panel {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }

    .login-card {
      width: 100%;
      max-width: 500px;
      background: rgba(12, 22, 42, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 3rem;
      border: 1px solid rgba(86, 165, 221, 0.15);
      box-shadow:
        0 0 40px rgba(86, 165, 221, 0.05),
        0 25px 50px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: fadeSlideUp 0.8s ease-out 0.15s both;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #145D90, #56A5DD);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.6rem;
      color: white;
      box-shadow: 0 8px 25px rgba(20, 93, 144, 0.4);
    }

    .login-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.4rem;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
    }

    /* Form groups */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      color: rgba(86, 165, 221, 0.5);
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.3s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(86, 165, 221, 0.15);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #e2e8f0;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .input-wrapper input:focus {
      border-color: #56A5DD;
      background: rgba(86, 165, 221, 0.08);
      box-shadow: 0 0 0 3px rgba(86, 165, 221, 0.1), 0 0 20px rgba(86, 165, 221, 0.05);
    }

    .input-wrapper input:focus~.input-icon {
      color: #56A5DD;
    }

    /* Password toggle */
    .toggle-password {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #56A5DD;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #56A5DD;
      cursor: pointer;
    }

    .checkbox-group label {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      margin: 0;
    }

    /* Buttons */
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #145D90, #56A5DD);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(20, 93, 144, 0.5);
    }

    .btn-login:hover::before {
      transform: translateX(100%);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-login .btn-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    .btn-login.loading .btn-spinner {
      display: inline-block;
    }

    .btn-login.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn-guest {
      width: 100%;
      padding: 0.85rem;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-guest:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      transform: translateY(-1px);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    }

    /* Error message */
    .error-msg {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.2);
      padding: 0.65rem 1rem;
      border-radius: 10px;
      margin-top: 1rem;
      display: none;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    /* Forgot password link */
    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      color: rgba(86, 165, 221, 0.7);
      font-size: 0.85rem;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #56A5DD;
    }

    /* Footer text */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.75rem;
    }

    /* ==========================================
       ANIMATIONS
       ========================================== */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-8px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-6px);
      }

      80% {
        transform: translateX(6px);
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        box-shadow: 0 0 40px rgba(86, 165, 221, 0.05), 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      50% {
        box-shadow: 0 0 60px rgba(86, 165, 221, 0.1), 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
    }

    .login-card:hover {
      animation: glowPulse 3s ease-in-out infinite;
    }

    /* ==========================================
       RESPONSIVE
       ========================================== */
    @media (max-width: 1024px) {
      .brand-panel {
        padding: 3rem;
      }

      .brand-title {
        font-size: 2.8rem;
      }
    }

    @media (max-width: 768px) {
      body {
        overflow: auto;
      }

      .login-wrapper {
        flex-direction: column;
        min-height: 100vh;
      }

      .brand-panel {
        flex: none;
        padding: 2.5rem 2rem 1.5rem;
        text-align: center;
        align-items: center;
      }

      .brand-title {
        font-size: 2.2rem;
      }

      .brand-subtitle {
        margin-bottom: 1.5rem;
      }

      .brand-features {
        display: none;
      }

      .brand-panel .circuit-decoration {
        display: none;
      }

      .form-panel {
        width: 100%;
        min-width: unset;
        padding: 1rem 1.5rem 2rem;
      }

      .login-card {
        padding: 2rem;
      }
    }

    @media (max-width: 480px) {
      .brand-panel {
        padding: 2rem 1.5rem 1rem;
      }

      .brand-logo {
        width: 80px;
      }

      .brand-title {
        font-size: 1.8rem;
      }

      .brand-subtitle {
        font-size: 0.9rem;
        letter-spacing: 2px;
      }

      .form-panel {
        padding: 0.5rem 1rem 1.5rem;
      }

      .login-card {
        padding: 1.5rem;
        border-radius: 20px;
      }

      .login-header .login-icon {
        width: 52px;
        height: 52px;
        font-size: 1.3rem;
        border-radius: 16px;
      }

      .login-header h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <!-- Animated background -->
  <div class="bg-particles">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Main wrapper -->
  <div class="login-wrapper">

    <!-- LEFT: Branding panel -->
    <div class="brand-panel">
      <div class="brand-content">
        <img src="assets/img/logo_compu.png" alt="Compunic Logo" class="brand-logo">
        <h1 class="brand-title">COMPU<span>NIC</span></h1>
        <p class="brand-subtitle">Sistema de Inventario</p>

        <div class="brand-features">
          <div class="brand-feature">
            <div class="feature-icon"><i class="fas fa-boxes-stacked"></i></div>
            <span>Control total de tu inventario en tiempo real</span>
          </div>
          <div class="brand-feature">
            <div class="feature-icon"><i class="fas fa-chart-line"></i></div>
            <span>Reportes y estadísticas de ventas</span>
          </div>
          <div class="brand-feature">
            <div class="feature-icon"><i class="fas fa-shield-halved"></i></div>
            <span>Seguridad avanzada y control de acceso</span>
          </div>
        </div>
      </div>

      <!-- Circuit decoration -->
      <div class="circuit-decoration">
        <svg viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M100 0 V60 H160 V120 H100 V180 H40 V240 H100 V300" stroke="#56A5DD" stroke-width="1.5" />
          <path d="M40 30 H100" stroke="#56A5DD" stroke-width="1" />
          <path d="M160 150 H100" stroke="#56A5DD" stroke-width="1" />
          <path d="M40 210 H160" stroke="#56A5DD" stroke-width="1" />
          <circle cx="100" cy="60" r="4" fill="#56A5DD" />
          <circle cx="160" cy="120" r="4" fill="#56A5DD" />
          <circle cx="100" cy="180" r="4" fill="#56A5DD" />
          <circle cx="40" cy="240" r="4" fill="#56A5DD" />
          <circle cx="40" cy="30" r="3" fill="#56A5DD" />
          <circle cx="160" cy="150" r="3" fill="#56A5DD" />
        </svg>
      </div>
    </div>

    <!-- RIGHT: Login form panel -->
    <div class="form-panel">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <i class="fas fa-user-shield"></i>
          </div>
          <h2>Bienvenido</h2>
          <p>Inicia sesión en tu cuenta</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="username">Usuario</label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password" placeholder="Ingresa tu contraseña" required
                autocomplete="current-password">
              <button type="button" class="toggle-password" id="togglePassword" title="Mostrar/ocultar contraseña">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="showPassword">
            <label for="showPassword">Mostrar contraseña</label>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-spinner"></span>
            <span class="btn-text">Iniciar Sesión</span>
          </button>

          <div class="divider"><span>o</span></div>

          <!-- boton de tienda web -->




          <p id="errorMsg" class="error-msg">Credenciales incorrectas</p>

          <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>

          <div class="login-footer">
            © 2026 Compunic · Todos los derechos reservados
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // FLOATING DOTS GENERATION
    // ==========================================
    (function createDots() {
      const container = document.querySelector('.bg-particles');
      for (let i = 0; i < 30; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.animationDuration = (8 + Math.random() * 15) + 's';
        dot.style.animationDelay = Math.random() * 10 + 's';
        dot.style.width = dot.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(dot);
      }
    })();

    // ==========================================
    // PASSWORD TOGGLE
    // ==========================================
    document.getElementById('togglePassword').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    document.getElementById('showPassword').addEventListener('change', function () {
      const passwordInput = document.getElementById('password');
      const icon = document.querySelector('#togglePassword i');
      passwordInput.type = this.checked ? 'text' : 'password';
      if (this.checked) {
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // ==========================================
    // AUTH LOGIC (preservado del original)
    // ==========================================
    Auth.checkLoginRedirect();

    // 🔒 PROTECCIÓN CONTRA FUERZA BRUTA
    const MAX_INTENTOS = 3;
    const TIEMPO_BLOQUEO = 5 * 60 * 1000;
    const LOGIN_ATTEMPTS_KEY = 'login_attempts';
    const LOGIN_BLOCKED_UNTIL_KEY = 'login_blocked_until';

    function getIntentosFallidos() {
      const attempts = localStorage.getItem(LOGIN_ATTEMPTS_KEY);
      return attempts ? parseInt(attempts) : 0;
    }

    function incrementarIntentos() {
      const intentos = getIntentosFallidos() + 1;
      localStorage.setItem(LOGIN_ATTEMPTS_KEY, intentos.toString());
      return intentos;
    }

    function resetearIntentos() {
      localStorage.removeItem(LOGIN_ATTEMPTS_KEY);
      localStorage.removeItem(LOGIN_BLOCKED_UNTIL_KEY);
    }

    function bloquearLogin() {
      const bloqueadoHasta = Date.now() + TIEMPO_BLOQUEO;
      localStorage.setItem(LOGIN_BLOCKED_UNTIL_KEY, bloqueadoHasta.toString());
    }

    function estaBloquedo() {
      const bloqueadoHasta = localStorage.getItem(LOGIN_BLOCKED_UNTIL_KEY);
      if (!bloqueadoHasta) return false;
      const tiempoRestante = parseInt(bloqueadoHasta) - Date.now();
      if (tiempoRestante > 0) {
        return Math.ceil(tiempoRestante / 1000 / 60);
      } else {
        resetearIntentos();
        return false;
      }
    }

    // Verificar bloqueo al cargar
    window.addEventListener('DOMContentLoaded', function () {
      const minutosBloqueo = estaBloquedo();
      if (minutosBloqueo) {
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('btnLogin');
        errorMsg.textContent = `🔒 Cuenta bloqueada. Intente nuevamente en ${minutosBloqueo} minuto(s).`;
        errorMsg.style.display = 'block';
        submitBtn.disabled = true;
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('btnLogin');

      // Verificar bloqueo
      const minutosBloqueo = estaBloquedo();
      if (minutosBloqueo) {
        errorMsg.textContent = `🔒 Cuenta bloqueada. Intente nuevamente en ${minutosBloqueo} minuto(s).`;
        errorMsg.style.display = 'block';
        submitBtn.disabled = true;
        return;
      }

      // Show loading
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      const loginSuccess = await Auth.login(user, pass);

      // Hide loading
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;

      if (loginSuccess) {
        resetearIntentos();
        window.location.href = 'dashboard.html';
      } else {
        const intentos = incrementarIntentos();
        const intentosRestantes = MAX_INTENTOS - intentos;

        if (intentos >= MAX_INTENTOS) {
          Auth.notifyLockout(user);
          bloquearLogin();
          errorMsg.textContent = `🔒 Demasiados intentos fallidos. Cuenta bloqueada por 5 minutos.`;
          submitBtn.disabled = true;
        } else {
          errorMsg.textContent = `❌ Credenciales incorrectas. Intentos restantes: ${intentosRestantes}`;
        }

        errorMsg.style.display = 'block';

        // Shake animation
        const card = document.querySelector('.login-card');
        card.style.animation = 'shake 0.5s';
        setTimeout(() => card.style.animation = '', 500);
      }
    });
  </script>
</body>

</html>
