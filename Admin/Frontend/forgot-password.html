<!DOCTYPE html>
<html lang="es">

<!--

  Plantilla principal. 
  Nota mental: Revisar accesibilidad (algún día). 
  ========================================== 
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Compunic</title>
    <meta name="description" content="Recupera tu contraseña del Sistema de Inventario Compunic">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/auth.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a1628;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background */
        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particles .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-particles .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #145D90, transparent 70%);
            top: -150px;
            left: -100px;
        }

        .bg-particles .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #56A5DD, transparent 70%);
            bottom: -100px;
            right: -50px;
            animation-delay: -7s;
            animation-duration: 25s;
        }

        .bg-particles .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #1a3a5c, transparent 70%);
            top: 50%;
            left: 40%;
            animation-delay: -14s;
            animation-duration: 30s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -40px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(15px, 30px) scale(1.02);
            }
        }

        .bg-particles .dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(86, 165, 221, 0.5);
            border-radius: 50%;
            animation: dotDrift linear infinite;
        }

        @keyframes dotDrift {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(86, 165, 221, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(86, 165, 221, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Card */
        .forgot-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            background: rgba(12, 22, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid rgba(86, 165, 221, 0.15);
            box-shadow:
                0 0 40px rgba(86, 165, 221, 0.05),
                0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: fadeSlideUp 0.8s ease-out;
            text-align: center;
            margin: 2rem;
        }

        .forgot-card:hover {
            animation: glowPulse 3s ease-in-out infinite;
        }

        /* Header */
        .forgot-header .forgot-icon {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.7rem;
            color: white;
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.35);
        }

        .forgot-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .forgot-header p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            color: rgba(86, 165, 221, 0.5);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(86, 165, 221, 0.15);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #e2e8f0;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-wrapper input:focus {
            border-color: #56A5DD;
            background: rgba(86, 165, 221, 0.08);
            box-shadow: 0 0 0 3px rgba(86, 165, 221, 0.1), 0 0 20px rgba(86, 165, 221, 0.05);
        }

        .input-wrapper input:focus~.input-icon {
            color: #56A5DD;
        }

        /* Button */
        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #145D90, #56A5DD);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(20, 93, 144, 0.5);
        }

        .btn-primary:hover::before {
            transform: translateX(100%);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Messages */
        .message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.12);
            color: #6ee7a0;
            border: 1px solid rgba(46, 204, 113, 0.25);
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 1.5rem;
            color: rgba(86, 165, 221, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #56A5DD;
        }

        /* Footer */
        .forgot-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
        }

        /* Animations */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(86, 165, 221, 0.05), 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }

            50% {
                box-shadow: 0 0 60px rgba(86, 165, 221, 0.1), 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                overflow: auto;
            }

            .forgot-card {
                padding: 2rem 1.5rem;
                margin: 1rem;
                border-radius: 20px;
            }

            .forgot-header .forgot-icon {
                width: 56px;
                height: 56px;
                font-size: 1.4rem;
                border-radius: 16px;
            }

            .forgot-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <!-- Fondo fachero y animaciones de fondo ✨ -->
    <div class="bg-particles">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="bg-grid"></div>

    <!-- Card -->
    <div class="forgot-card">
        <div class="forgot-header">
            <div class="forgot-icon">
                <i class="fas fa-key"></i>
            </div>
            <h2>¿Olvidaste tu contraseña?</h2>
            <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">
                <i class="fas fa-paper-plane"></i>
                <span>Enviar Instrucciones</span>
            </button>
            <div id="message" class="message"></div>
        </form>

        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Volver al inicio de sesión
        </a>

        <div class="forgot-footer">
            © 2026 Compunic · Todos los derechos reservados
        </div>
    </div>

    <script>
        // Floating dots
        (function createDots() {
            const container = document.querySelector('.bg-particles');
            for (let i = 0; i < 25; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.animationDuration = (8 + Math.random() * 15) + 's';
                dot.style.animationDelay = Math.random() * 10 + 's';
                dot.style.width = dot.style.height = (2 + Math.random() * 3) + 'px';
                container.appendChild(dot);
            }
        })();

        // Form logic (preserved)
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');

            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = 'Enviando...';
            messageDiv.style.display = 'none';

            try {
                const result = await Auth.forgotPassword(email);

                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ' + result.message;
                    messageDiv.style.display = 'block';

                    document.getElementById('forgotForm').reset();

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 5000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + result.message;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Error de conexión con el servidor';
                messageDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = 'Enviar Instrucciones';
            }
        });
    </script>
</body>

</html>
