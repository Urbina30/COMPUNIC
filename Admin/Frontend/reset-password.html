<!DOCTYPE html>
<html lang="es">

<!-- 
  ¡Atención! Este HTML fue ensamblado a altas horas de la noche ☕. 
  Si ves un div anidado 5 veces, lo siento, era necesario para centrar un botón.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Compunic</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="js/auth.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(90deg, rgba(2, 0, 36, 1) 0%, rgb(91, 47, 149) 35%, rgba(0, 212, 255, 1) 100%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            text-align: center;
        }

        .login-card {
            background: rgba(185, 187, 190, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .login-logo {
            width: 80px;
            margin-bottom: 1rem;
        }

        .login-title {
            color: #000000;
            margin-bottom: 1rem;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .subtitle {
            color: #000000;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #000000;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #000000;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            font-weight: bold;
        }

        .back-link:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            color: #000000;
            border: 1px solid #27ae60;
            font-weight: 500;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #000000;
            border: 1px solid #c0392b;
            font-weight: 500;
        }

        .message.warning {
            background: rgba(241, 196, 15, 0.2);
            color: #000000;
            border: 1px solid #f39c12;
            font-weight: 500;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .password-requirements {
            text-align: left;
            background: rgba(255, 255, 255, 0.5);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #000000;
            font-weight: 500;
        }

        .password-requirements ul {
            margin: 0.5rem 0 0 0;
            padding-left: 1.5rem;
        }

        .password-requirements li {
            margin: 0.3rem 0;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .input-error {
            border-color: #e74c3c !important;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2) !important;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Loading State -->
            <div id="loadingState" class="loading-spinner">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; color: #555;">Validando enlace...</p>
            </div>

            <!-- Main Form -->
            <div id="mainContent" style="display: none;">
                <div class="icon">🔑</div>
                <h2 class="login-title">Nueva Contraseña</h2>
                <p class="subtitle" id="usernameDisplay"></p>

                <form id="resetForm">
                    <div class="password-requirements">
                        <strong>Requisitos de contraseña:</strong>
                        <ul>
                            <li>Mínimo 8 caracteres</li>
                            <li>Obligatorio: letras y números</li>
                        </ul>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Nueva Contraseña</label>
                        <input type="password" id="newPassword" class="form-control"
                            placeholder="Ingresa tu nueva contraseña" required minlength="8">
                    </div>


                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" class="form-control"
                            placeholder="Confirma tu nueva contraseña" required minlength="8">
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; margin-bottom: 1rem;">
                        <input type="checkbox" id="showPasswords" style="margin-right: 0.5rem; width: auto;">
                        <label for="showPasswords" style="margin-bottom: 0; cursor: pointer; user-select: none;">Mostrar
                            contraseñas</label>
                    </div>

                    <script>
                        document.getElementById('showPasswords').addEventListener('change', function () {
                            const newPass = document.getElementById('newPassword');
                            const confirmPass = document.getElementById('confirmPassword');
                            const type = this.checked ? 'text' : 'password';
                            newPass.type = type;
                            confirmPass.type = type;
                        });

                        // Validación en tiempo real
                        const newPassInput = document.getElementById('newPassword');
                        const confirmPassInput = document.getElementById('confirmPassword');

                        function validarCoincidencia() {
                            const pass1 = newPassInput.value;
                            const pass2 = confirmPassInput.value;

                            // Solo validar si el campo de confirmación tiene algo escrito
                            if (pass2.length > 0) {
                                if (pass1 !== pass2) {
                                    confirmPassInput.classList.add('input-error');
                                } else {
                                    confirmPassInput.classList.remove('input-error');
                                }
                            } else {
                                confirmPassInput.classList.remove('input-error');
                            }
                        }

                        // Escuchar cambios en ambos campos
                        newPassInput.addEventListener('input', validarCoincidencia);
                        confirmPassInput.addEventListener('input', validarCoincidencia);
                    </script>

                    <button type="submit" class="btn-primary" id="submitBtn">Restablecer Contraseña</button>
                    <div id="message" class="message"></div>
                </form>
            </div>

            <!-- Error State -->
            <div id="errorState" style="display: none;">
                <div class="icon">⚠️</div>
                <h2 class="login-title">Enlace Inválido</h2>
                <p class="subtitle" id="errorMessage"></p>
                <a href="forgot-password.html" class="btn-primary"
                    style="display: inline-block; text-decoration: none;">
                    Solicitar Nuevo Enlace
                </a>
            </div>

            <a href="index.html" class="back-link">← Volver al inicio de sesión</a>
        </div>
    </div>

    <script>
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const loadingState = document.getElementById('loadingState');
        const mainContent = document.getElementById('mainContent');
        const errorState = document.getElementById('errorState');

        // Validar token al cargar la página
        async function validateTokenOnLoad() {
            if (!token) {
                showError('No se proporcionó un token de recuperación válido.');
                return;
            }

            loadingState.style.display = 'block';

            try {
                const result = await Auth.validateToken(token);

                if (result.valid) {
                    // Token válido - mostrar formulario
                    document.getElementById('usernameDisplay').textContent = `Usuario: ${result.username}`;
                    loadingState.style.display = 'none';
                    mainContent.style.display = 'block';
                } else {
                    // Token inválido
                    showError(result.error || 'El enlace de recuperación es inválido o ha expirado.');
                }
            } catch (error) {
                showError('Error al validar el enlace de recuperación.');
            }
        }

        function showError(message) {
            loadingState.style.display = 'none';
            errorState.style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // Manejar envío del formulario
        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');

            // Validar que las contraseñas coincidan
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Las contraseñas no coinciden';
                messageDiv.style.display = 'block';
                return;
            }

            // Validar longitud mínima
            if (newPassword.length < 8) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ La contraseña debe tener al menos 8 caracteres';
                messageDiv.style.display = 'block';
                return;
            }

            // Validar complejidad (letras y números)
            const strongPasswordRegex = /^(?=.*[a-zA-Z])(?=.*\d)/;
            if (!strongPasswordRegex.test(newPassword)) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Su contraseña es muy débil. Debe combinar letras y números.';
                messageDiv.style.display = 'block';
                return;
            }

            // Deshabilitar botón mientras se procesa
            submitBtn.disabled = true;
            submitBtn.textContent = 'Restableciendo...';
            messageDiv.style.display = 'none';

            try {
                const result = await Auth.resetPassword(token, newPassword);

                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ' + result.message;
                    messageDiv.style.display = 'block';

                    // Limpiar formulario
                    document.getElementById('resetForm').reset();

                    // Redirigir al login después de 3 segundos
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + result.message;
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Restablecer Contraseña';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Error de conexión con el servidor';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Restablecer Contraseña';
            }
        });

        // Validar token al cargar
        validateTokenOnLoad();
    </script>
</body>

</html>
