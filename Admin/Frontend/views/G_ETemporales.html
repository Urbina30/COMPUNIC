<div class="main-container">
    <header>
        <h1>Gestión de Empleados Temporales</h1>
    </header>

    <div class="content-wrapper">

        <div class="form-container">
            <h2><i class="fas fa-user-plus"></i> Registrar Nuevo Empleado Temporal</h2>
            <form id="e-temporal-form">
                <input type="hidden" id="id_e_temporal">

                <div class="form-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="nombre">Nombre:</label>
                        <div class="input-with-icon">
                            <span class="input-icon">👤</span>
                            <input type="text" id="nombre" name="nombre" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="apellido">Apellido:</label>
                        <div class="input-with-icon">
                            <span class="input-icon">👤</span>
                            <input type="text" id="apellido" name="apellido" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="telefono">Teléfono:</label>
                        <div class="input-with-icon">
                            <span class="input-icon">📞</span>
                            <input type="text" id="telefono" name="telefono" class="form-control">
                        </div>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="email">Email:</label>
                        <div class="input-with-icon">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" name="email" class="form-control">
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="direccion">Dirección:</label>
                    <div class="input-with-icon">
                        <span class="input-icon">📍</span>
                        <input type="text" id="direccion" name="direccion" class="form-control">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="id_administrador">Administrador Responsable:</label>
                    <select id="id_administrador" name="id_administrador" class="form-control">
                        <option value="">Seleccione un administrador</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="submit" id="btn-agregar-et" class="btn-primary">Guardar</button>
                    <button type="button" id="btn-modificar-et" class="btn-warning" disabled>Modificar</button>
                    <button type="button" id="btn-eliminar-et" class="btn-danger" disabled>Eliminar</button>
                    <button type="button" id="btn-limpiar-et" class="btn-secondary">Limpiar</button>
                </div>
            </form>
        </div>

        <div class="table-container catalogo-section" style="margin-top: 25px;">
            <h3><i class="fas fa-users"></i> Lista de Empleados Temporales</h3>
            <p>Administración de personal temporal.</p>

            <table id="tabla-e-temporales">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

    </div>
</div>
